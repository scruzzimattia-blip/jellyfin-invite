name: PR Checks

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  conventional-commits:
    name: Conventional commits
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        run: |
          pattern='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-zA-Z0-9._-]+\))?!?: .+'
          commits="$(git log --format=%s origin/${{ github.base_ref }}..HEAD)"

          while IFS= read -r subject; do
            if ! printf '%s\n' "$subject" | grep -Eq "$pattern"; then
              echo "Invalid commit message: $subject"
              echo "Expected Conventional Commits format, for example: feat: add invitation email system"
              exit 1
            fi
          done <<< "$commits"

  label-and-preview:
    name: Label and preview comment
    runs-on: ubuntu-latest
    needs: conventional-commits

    steps:
      - name: Apply label from commit prefix
        uses: actions/github-script@v7
        with:
          script: |
            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const prefixes = commits.map(commit => commit.commit.message.split(":")[0].split("(")[0]);
            const labels = new Set();

            if (prefixes.includes("fix")) labels.add("bug");
            if (prefixes.includes("feat")) labels.add("feature");
            if (prefixes.some(prefix => ["chore", "ci", "build", "docs", "refactor", "test"].includes(prefix))) {
              labels.add("chore");
            }

            if (labels.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: [...labels],
              });
            }

      - name: Post preview placeholder
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- jellyfin-invite-preview -->";
            const body = `${marker}
            ## Build Preview

            Preview deployment: _not configured yet_.

            This placeholder will be replaced once a preview environment is connected.`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const existing = comments.find(comment => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
