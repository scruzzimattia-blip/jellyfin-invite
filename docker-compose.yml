services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: production
    env_file:
      - .env
    environment:
      DATABASE_URL: file:/data/jellyfin-invite.db
    ports:
      - "3000:3000"
    volumes:
      - jellyfin-invite-db:/data
      - ./.env:/app/.env:ro
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: production
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  jellyfin-invite-db:
